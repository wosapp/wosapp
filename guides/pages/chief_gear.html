<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chief Gear Calculator</title>
    <link rel="stylesheet" href="/style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2112126597648781"
     crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <h1>Chief Gear Calculator</h1>
        <p class="tagline">Calculate materials needed for upgrading chief gear</p>
    </header>
    <main>
    <div id="common-buttons"></div>
    <script>
      fetch('/utils/buttons.html')
        .then(response => response.text())
        .then(html => {
          document.getElementById('common-buttons').innerHTML = html;
        });
    </script>

    <!-- Gear boxes -->
    <div class="tools-container" id="gear-container">
      <!-- Injected by JS -->
    </div>

    <!-- Summary Boxes -->
    <div class="full-width-box" id="materials-summary">
      <h2>Total Upgrade Materials</h2>
      <div id="materials-list">Select gear upgrades to see requirements.</div>
    </div>

    <div class="full-width-box" id="stats-summary">
      <h2>Total Stat Boost</h2>
      <div id="stats-list">No stat data available.</div>
    </div>
</main>

<footer>
  <p class="footer-credits">© 2025 Whiteout Survival Hub</p>
</footer>

<script>
const gearNames = ["Cap", "Watch", "Coat", "Pants", "Ring", "Weapon"];
let gearData = {};

async function loadCSV() {
  const res = await fetch("/data/chief_gear.csv");
  const text = await res.text();
  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0]; // ["Gear","Tier","Hardened_Alloy","Polishing_Solution","Design_Plan","Lunar_Amber"]
  
  rows.slice(1).forEach(row => {
    const gear = row[0].trim();
    const tier = parseInt(row[1]);
    if (!gearData[gear]) gearData[gear] = {};
    gearData[gear][tier] = {
      Hardened_Alloy: parseFloat(row[2]) || 0,
      Polishing_Solution: parseFloat(row[3]) || 0,
      Design_Plan: parseFloat(row[4]) || 0,
      Lunar_Amber: parseFloat(row[5]) || 0
    };
  });
}

function createGearBoxes() {
  const container = document.getElementById("gear-container");
  gearNames.forEach(name => {
    const div = document.createElement("div");
    div.className = "tool-box";
    div.innerHTML = `
      <h2>${name}</h2>
      <label>From: 
        <select class="from-level" data-gear="${name}"></select>
      </label>
      <label>To: 
        <select class="to-level" data-gear="${name}"></select>
      </label>
    `;
    container.appendChild(div);
  });
}

function populateDropdowns() {
  document.querySelectorAll(".from-level, .to-level").forEach(sel => {
    const gear = sel.dataset.gear;
    const levels = Object.keys(gearData[gear])
      .map(n => parseInt(n))
      .sort((a, b) => a - b);

    levels.forEach(lv => {
      const opt = document.createElement("option");
      opt.value = lv;
      opt.textContent = lv;
      sel.appendChild(opt);
    });

    // Defaults: from lowest tier, to highest tier
    if (sel.classList.contains("from-level")) sel.value = levels[0];
    if (sel.classList.contains("to-level")) sel.value = levels[levels.length - 1];
  });
}

function calculateTotals() {
  let materials = {
    Hardened_Alloy: 0,
    Polishing_Solution: 0,
    Design_Plan: 0,
    Lunar_Amber: 0
  };

  document.querySelectorAll(".from-level").forEach((fromSel, idx) => {
    const gear = fromSel.dataset.gear;
    const toSel = document.querySelectorAll(".to-level")[idx];
    const fromLv = parseInt(fromSel.value);
    const toLv = parseInt(toSel.value);

    if (toLv > fromLv) {
      for (let lv = fromLv + 1; lv <= toLv; lv++) {
        const reqs = gearData[gear][lv];
        for (const mat in materials) {
          materials[mat] += reqs[mat] || 0;
        }
      }
    }
  });

  // Update materials summary
  document.getElementById("materials-list").innerHTML =
    Object.entries(materials)
      .map(([k, v]) => `<div>${k}: ${v}</div>`)
      .join("");

  // No stats in this CSV
  document.getElementById("stats-list").innerHTML = "No stat data available.";
}

document.addEventListener("change", e => {
  if (e.target.matches(".from-level, .to-level")) {
    calculateTotals();
  }
});

(async function init() {
  await loadCSV();
  createGearBoxes();
  populateDropdowns();
  calculateTotals(); // Initial calculation
})();
</script>
</body>
</html>
